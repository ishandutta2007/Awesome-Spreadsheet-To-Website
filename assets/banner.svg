<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f051d" />
    </linearGradient>

    <!-- Brand Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>

    <!-- Spreadsheet Icon Gradient -->
    <linearGradient id="sheetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" />
    </pattern>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&amp;display=swap');
    
    .title {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 800;
      font-size: 46px;
      fill: url(#primaryGrad);
    }
    
    .subtitle {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 400;
      font-size: 20px;
      fill: #94a3b8;
    }

    .badge-text {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 600;
      font-size: 13px;
      fill: #ffffff;
    }

    /* CSS Animations for Dynamic Aspect */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    @keyframes pulse-glow {
      0% { opacity: 0.2; }
      50% { opacity: 0.5; }
      100% { opacity: 0.2; }
    }

    @keyframes morph-arrow {
      0% { transform: translateX(0px); }
      50% { transform: translateX(8px); }
      100% { transform: translateX(0px); }
    }

    .floating-element {
      animation: float 6s ease-in-out infinite;
    }

    .delayed-float {
      animation: float 6s ease-in-out infinite;
      animation-delay: 3s;
    }

    .glowing-circle {
      animation: pulse-glow 4s ease-in-out infinite;
    }

    .moving-arrow {
      animation: morph-arrow 2s ease-in-out infinite;
    }

    .grid-bg {
      fill: url(#grid);
    }
  </style>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />
  <rect width="1200" height="400" class="grid-bg" />

  <!-- Ambient Glow Lights -->
  <circle cx="200" cy="100" r="150" fill="#a855f7" opacity="0.15" filter="url(#glow)" class="glowing-circle" />
  <circle cx="1000" cy="300" r="180" fill="#06b6d4" opacity="0.15" filter="url(#glow)" class="glowing-circle" style="animation-delay: 2s;" />

  <!-- Left Side: Interactive Graphics representing Spreadsheet to Web translation -->
  <g transform="translate(100, 80)">
    <!-- Spreadsheet Screen -->
    <g class="floating-element">
      <rect x="0" y="40" width="180" height="130" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2" />
      <rect x="0" y="40" width="180" height="30" rx="12" fill="#0f172a" />
      <!-- Green Sheets Header Accent -->
      <rect x="12" y="48" width="14" height="14" rx="3" fill="url(#sheetGrad)" />
      <circle cx="45" cy="55" r="3" fill="#ef4444" />
      <circle cx="57" cy="55" r="3" fill="#f59e0b" />
      <circle cx="69" cy="55" r="3" fill="#10b981" />
      
      <!-- Sheets Rows -->
      <rect x="12" y="85" width="40" height="10" rx="2" fill="#10b981" fill-opacity="0.6" />
      <rect x="60" y="85" width="105" height="10" rx="2" fill="#334155" />
      <rect x="12" y="105" width="40" height="10" rx="2" fill="#10b981" fill-opacity="0.6" />
      <rect x="60" y="105" width="105" height="10" rx="2" fill="#334155" />
      <rect x="12" y="125" width="40" height="10" rx="2" fill="#10b981" fill-opacity="0.6" />
      <rect x="60" y="125" width="105" height="10" rx="2" fill="#334155" />
      <rect x="12" y="145" width="40" height="10" rx="2" fill="#10b981" fill-opacity="0.6" />
      <rect x="60" y="145" width="105" height="10" rx="2" fill="#334155" />
    </g>

    <!-- Translation Line & Arrow -->
    <g class="moving-arrow" transform="translate(200, 0)">
      <path d="M 15 105 L 65 105" stroke="url(#primaryGrad)" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 4" />
      <polygon points="65,97 81,105 65,113" fill="#06b6d4" />
    </g>

    <!-- Web App / Portal Screen -->
    <g class="delayed-float" transform="translate(300, 20)">
      <rect x="0" y="0" width="220" height="160" rx="16" fill="#0f172a" stroke="#a855f7" stroke-width="2" stroke-opacity="0.8" filter="url(#glow)" />
      <!-- Window Controls -->
      <rect x="0" y="0" width="220" height="35" rx="16" fill="#1e1b4b" />
      <circle cx="16" cy="18" r="4" fill="#ef4444" />
      <circle cx="28" cy="18" r="4" fill="#f59e0b" />
      <circle cx="40" cy="18" r="4" fill="#10b981" />
      <rect x="60" y="11" width="100" height="14" rx="7" fill="#0f051d" />

      <!-- Web Content Modules -->
      <rect x="15" y="50" width="60" height="45" rx="6" fill="url(#primaryGrad)" fill-opacity="0.15" stroke="#a855f7" stroke-width="1" />
      <circle cx="45" cy="72" r="10" fill="#a855f7" />
      
      <rect x="85" y="50" width="120" height="10" rx="3" fill="#ffffff" fill-opacity="0.9" />
      <rect x="85" y="65" width="100" height="8" rx="3" fill="#94a3b8" />
      <rect x="85" y="78" width="120" height="8" rx="3" fill="#334155" />
      
      <rect x="15" y="110" width="190" height="35" rx="8" fill="#1e293b" />
      <rect x="25" y="122" width="80" height="10" rx="3" fill="#06b6d4" />
      <rect x="160" y="118" width="35" height="18" rx="9" fill="#06b6d4" />
    </g>
  </g>

  <!-- Right Side: Text & Brand Header -->
  <g transform="translate(670, 150)">
    <text x="0" y="0" class="title">SPREADSHEET</text>
    <text x="0" y="50" class="title">TO WEBSITE</text>
    <text x="0" y="95" class="subtitle">Turn Sheets, Airtable &amp; Excel into apps</text>
    <text x="0" y="120" class="subtitle">No-code, self-hosted, &amp; open-source</text>

    <!-- Action Badges -->
    <g transform="translate(0, 155)">
      <!-- 2026 Production Ready Badge -->
      <rect x="0" y="0" width="135" height="28" rx="14" fill="#10b981" />
      <text x="14" y="18" class="badge-text">⚡ RELEASE v2026</text>

      <!-- Zero Lock-In Badge -->
      <rect x="145" y="0" width="130" height="28" rx="14" fill="#6366f1" />
      <text x="160" y="18" class="badge-text">🔓 ZERO LOCK-IN</text>
    </g>
  </g>
</svg>
